<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worry Journal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Worry Journal</h1>
    <p class="subtitle">Write it down, let it out.</p>

    <form id="worry-form">
      <textarea
        id="worry-input"
        placeholder="What's on your mind?"
        rows="4"
        maxlength="500"
      ></textarea>
      <div class="form-footer">
        <span id="char-count">0 / 500</span>
        <button type="submit">Add worry</button>
      </div>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="came_true">Came true</button>
      <button class="filter-btn" data-filter="didnt_happen">Didn't happen</button>
    </div>

    <ul id="worry-list"></ul>

    <p id="empty-msg" class="empty-msg">No worries here yet.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
