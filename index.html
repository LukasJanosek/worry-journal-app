<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worry Journal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Worry Journal</h1>
    <p class="subtitle">Write it down, let it out.</p>

    <form id="worry-form">
      <textarea
        id="worry-input"
        placeholder="What's on your mind?"
        rows="4"
        maxlength="500"
      ></textarea>
      <div class="form-footer">
        <span id="char-count">0 / 500</span>
        <button type="submit">Add worry</button>
      </div>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="open" data-label="Open">Open</button>
      <button class="filter-btn" data-filter="came_true" data-label="Came true">Came true</button>
      <button class="filter-btn" data-filter="didnt_happen" data-label="Didn't happen">Didn't happen</button>
    </div>

    <ul id="worry-list"></ul>

    <div id="chart-section" class="chart-section">
      <h2>Worry outcomes</h2>
      <div id="chart-container" class="chart-container"></div>
    </div>

    <div id="empty-msg" class="empty-msg">

      <p>No worries here yet.</p>
      <p>Clear your mind by writing it down in the section above.</p>
    </div>
  </div>

  <script src="app.js"></script>
